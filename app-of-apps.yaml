apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'app-of-apps'
spec:
  destination:
    name: 'in-cluster'
    namespace: 'argocd'
  source:
    path: 'apps/'
    repoURL: 'https://github.com/Snuffules/argocd-demo-leaderboard-qa-dev-helm'
    targetRevision: HEAD
  project: 'default'
